---
# PHP из PPA ondrej/php (свежие версии) + распространённые расширения и CLI.
- name: Установить зависимости для добавления PPA
  ansible.builtin.apt:
    name:
      - software-properties-common
      - gnupg
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Добавить PPA ondrej/php
  ansible.builtin.apt_repository:
    repo: "ppa:ondrej/php"
    state: present
    update_cache: true

- name: Установить PHP и расширения
  ansible.builtin.apt:
    name:
      - "php{{ php_version }}-cli"
      - "php{{ php_version }}-fpm"
      - "php{{ php_version }}-common"
      - "php{{ php_version }}-curl"
      - "php{{ php_version }}-mbstring"
      - "php{{ php_version }}-xml"
      - "php{{ php_version }}-zip"
      - "php{{ php_version }}-bcmath"
      - "php{{ php_version }}-intl"
      - "php{{ php_version }}-gd"
      - "php{{ php_version }}-mysql"
      - "php{{ php_version }}-pgsql"
    state: present

- name: Установить Composer
  ansible.builtin.get_url:
    url: https://getcomposer.org/installer
    dest: /tmp/composer-installer.php
    mode: "0644"

- name: Проверить наличие Composer
  ansible.builtin.stat:
    path: "{{ runtimes_bin_dir }}/composer"
  register: composer_stat

- name: Установить Composer в /usr/local/bin
  ansible.builtin.command:
    cmd: "php /tmp/composer-installer.php --install-dir={{ runtimes_bin_dir }} --filename=composer"
  when: not composer_stat.stat.exists
  changed_when: true

- name: Показать версии PHP и Composer
  ansible.builtin.shell:
    cmd: "php -v | head -n1; composer --version"
    executable: /bin/bash
  register: php_versions
  changed_when: false

- name: Вывести версии PHP/Composer
  ansible.builtin.debug:
    msg: "{{ php_versions.stdout_lines }}"
