---
# Node.js из репозитория NodeSource + pm2 глобально через npm.
- name: Создать каталог для ключей APT
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Скачать ключ NodeSource
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /etc/apt/keyrings/nodesource.asc
    mode: "0644"

- name: Добавить репозиторий NodeSource
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nodesource.asc] https://deb.nodesource.com/node_{{ nodejs_major }}.x nodistro main"
    filename: nodesource
    state: present
    update_cache: true

- name: Установить Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present

- name: Установить pm2 глобально
  community.general.npm:
    name: pm2
    global: true
    state: present
  tags: [pm2]

- name: Показать версии Node.js и pm2
  ansible.builtin.shell:
    cmd: "set -o pipefail; echo node $(node -v); echo npm $(npm -v); echo pm2 $(pm2 -v)"
    executable: /bin/bash
  register: node_versions
  changed_when: false

- name: Вывести версии Node.js/pm2
  ansible.builtin.debug:
    msg: "{{ node_versions.stdout_lines }}"
