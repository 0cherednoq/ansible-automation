---
- name: Проверить обязательные параметры деплоя
  ansible.builtin.assert:
    that:
      - app_repo | length > 0
      - "'OWNER/REPOSITORY' not in app_repo"
      - docker_compose_files | length > 0
    fail_msg: "Укажите реальный app_repo и хотя бы один compose-файл в docker_compose_files."

# Приватный репозиторий Gitea по HTTP: токен передаём через HTTP-заголовок,
# чтобы он не оседал в .git/config (в отличие от токена в URL).
# Токен храните в Ansible Vault, задавайте переменную app_git_token.
- name: Клонировать репозиторий или получить изменения из Git
  ansible.builtin.git:
    repo: "{{ app_repo }}"
    dest: "{{ app_root }}"
    version: "{{ app_version }}"
    update: true
    force: true
  environment: "{{ git_auth_env }}"
  vars:
    # Basic-авторизация работает у GitHub/GitLab/Gitea (токен как пароль).
    git_auth_env: >-
      {{
        {'GIT_CONFIG_COUNT': '1',
         'GIT_CONFIG_KEY_0': 'http.extraHeader',
         'GIT_CONFIG_VALUE_0': 'Authorization: Basic '
           ~ (((app_git_user | default('oauth2')) ~ ':' ~ app_git_token) | b64encode)}
        if (app_git_token | default('') | length > 0) else {}
      }}
  no_log: "{{ app_git_token | default('') | length > 0 }}"
  register: git_result

- name: Проверить наличие всех Docker Compose-файлов
  ansible.builtin.stat:
    path: "{{ app_root }}/{{ item }}"
  loop: "{{ docker_compose_files }}"
  register: compose_files_stat

- name: Остановить деплой, если какой-то Compose-файл отсутствует
  ansible.builtin.assert:
    that: item.stat.isreg | default(false)
    fail_msg: >-
      Файл {{ app_root }}/{{ item.item }} не найден.
      Проверьте docker_compose_files и содержимое репозитория.
    quiet: true
  loop: "{{ compose_files_stat.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Собрать образы (Docker Compose build)
  ansible.builtin.command:
    cmd: "{{ docker_build_command }}"
    chdir: "{{ app_root }}"
  register: docker_build
  changed_when: true

- name: Показать лог сборки
  ansible.builtin.debug:
    msg: "{{ (docker_build.stdout ~ '\n' ~ docker_build.stderr).split('\n') }}"

- name: Запустить приложение (Docker Compose up)
  ansible.builtin.command:
    cmd: "{{ docker_up_command }}"
    chdir: "{{ app_root }}"
  register: docker_up
  changed_when: true

- name: Показать лог запуска
  ansible.builtin.debug:
    msg: "{{ (docker_up.stdout ~ '\n' ~ docker_up.stderr).split('\n') }}"

- name: Удалить неиспользуемые Docker-образы
  ansible.builtin.command:
    cmd: docker image prune -f
  register: docker_prune
  changed_when: "'Total reclaimed space: 0B' not in docker_prune.stdout"
