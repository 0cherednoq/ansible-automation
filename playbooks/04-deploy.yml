---
# Единый плейбук для первого деплоя и редеплоя.
# Первый запуск клонирует репозиторий, последующие — обновляют.
# Редеплой конкретной версии: -e app_version=<tag-or-commit>
#
# Rolling deploy: раскатка идёт по одному серверу за раз (serial: 1).
# Если на сервере деплой упал (например, --wait не дождался healthcheck),
# max_fail_percentage: 0 останавливает раскатку — остальные серверы не трогаются.
# Ускорить можно, задав serial больше (напр. serial: 2) или в процентах ("50%").
- name: Деплой приложения
  hosts: app
  become: true
  serial: 1
  max_fail_percentage: 0
  roles:
    - app_deploy
