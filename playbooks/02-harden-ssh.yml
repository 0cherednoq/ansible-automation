---
# Отключение SSH-аутентификации по паролю и установка базовых утилит.
# Запускается после 01-bootstrap-ssh.yml, когда вход по ключу уже проверен.
- name: Отключить пароль в SSH и установить базовые утилиты
  hosts: app
  become: true
  tasks:
    - name: Установить базовые утилиты
      ansible.builtin.apt:
        name: "{{ base_utils }}"
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Запретить SSH-аутентификацию по паролю
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/99-ansible-hardening.conf
        content: |
          PasswordAuthentication no
          KbdInteractiveAuthentication no
          PubkeyAuthentication yes
          PermitRootLogin prohibit-password
        owner: root
        group: root
        mode: "0644"
        validate: "/usr/sbin/sshd -t -f %s"
      notify: Reload ssh

  handlers:
    - name: Reload ssh
      ansible.builtin.service:
        name: ssh
        state: reloaded
