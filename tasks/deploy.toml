# Категория deploy: деплой приложения.

["deploy:run"]
description = "04 · Деплой/редеплой (Vault авто; доп.: -e app_version=<tag>, --limit)"
run = """
vault=""
[ -f "$VAULT_PASS_FILE" ] && vault="--vault-password-file $VAULT_PASS_FILE"
ansible-playbook playbooks/04-deploy.yml $vault "$@"
"""

["deploy:check"]
description = "Dry-run деплоя без изменений (--check --diff)"
run = """
vault=""
[ -f "$VAULT_PASS_FILE" ] && vault="--vault-password-file $VAULT_PASS_FILE"
ansible-playbook playbooks/04-deploy.yml --check --diff $vault "$@"
"""
