# Категория maintenance: обслуживание.

["maintenance:clean"]
description = "Освободить место на серверах: убрать неиспользуемые образы и build-кэш (volumes НЕ трогает)"
run = """
ansible app -m shell -a 'df -h / && echo "---" && docker system df'
echo "=== очистка ==="
ansible app -m shell -a 'docker container prune -f && docker image prune -af && docker builder prune -af'
echo "=== после ==="
ansible app -m shell -a 'df -h /'
"""

["maintenance:syntax"]
description = "Проверить синтаксис всех плейбуков"
run = """
for pb in playbooks/*.yml; do
  echo "== $pb =="
  ansible-playbook "$pb" --syntax-check
done
"""
