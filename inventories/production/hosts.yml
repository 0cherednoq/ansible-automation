---
# Деплой на несколько серверов.
# Каждый сервер перечислен в двух группах:
#   bootstrap — первый вход по логину/паролю (до установки ключа);
#   app       — все последующие подключения по ключу (деплой, подготовка и т.д.).
# ansible_host у одноимённых записей должен совпадать.
all:
  children:
    bootstrap:
      hosts:
        srv1:
          ansible_host: 192.0.2.10

      vars:
        ansible_user: root
        # Пароль не храните здесь. Передавайте: --ask-pass
    app:
      hosts:
        srv1:
          ansible_host: 192.0.2.10

      vars:
        ansible_user: root
        ansible_ssh_private_key_file: "{{ ssh_private_key_path }}"
